# Render Blueprint Infrastructure Specification
# FIFA World Cup 2026 Stadium Operations & Fan Portal (v2.0)

services:
  # ── Backend Service (FastAPI Core) ──────────────────────────────────────────
  - type: web
    name: fifa-wc-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-wc-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: '*'

  # ── Frontend Service (Next.js Dashboard) ────────────────────────────────────
  - type: web
    name: fifa-wc-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://fifa-wc-backend.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: wss://fifa-wc-backend.onrender.com/ws/updates

# ── Managed PostgreSQL Database (Free Tier) ──────────────────────────────────
databases:
  - name: fifa-wc-postgres
    databaseName: stadium_ops
    user: admin
    plan: free
