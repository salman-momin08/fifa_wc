# Render Blueprint Infrastructure Specification
# FIFA World Cup 2026 Stadium Operations & Fan Portal (v2.0)
#
# Deploy on Render:
# 1. Push code to GitHub
# 2. Go to https://dashboard.render.com -> New -> Blueprint
# 3. Connect your repository — Render will provision all services automatically!

services:
  # ── Backend Service (FastAPI API Core) ───────────────────────────────────────
  - type: web
    name: fifa-wc-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-wc-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fifa-wc-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: GEMINI_API_KEY
        sync: false  # Fill in via Render Dashboard
      - key: ALLOWED_ORIGINS
        value: https://fifa-wc-frontend.onrender.com

  # ── Frontend Service (Next.js Dashboard) ─────────────────────────────────────
  - type: web
    name: fifa-wc-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://fifa-wc-backend.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: wss://fifa-wc-backend.onrender.com/ws/updates

  # ── Async Worker Service (Celery Background Tasks) ──────────────────────────
  - type: worker
    name: fifa-wc-celery
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-wc-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fifa-wc-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

# ── Managed Databases & Caches ────────────────────────────────────────────────
databases:
  - name: fifa-wc-postgres
    databaseName: stadium_ops
    user: admin
    plan: free  # Change to starter or higher for production scale

# ── Redis Key-Value Store ─────────────────────────────────────────────────────
# Render managed Redis service
