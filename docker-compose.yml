version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fifa_wc_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stadium_ops}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_in_prod}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-stadium_ops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fifa_wc_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fifa_wc_backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:dev_password_change_in_prod@postgres:5432/stadium_ops}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_key_change_in_prod}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - SENTRY_DSN=${SENTRY_DSN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/venv

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fifa_wc_celery
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:dev_password_change_in_prod@postgres:5432/stadium_ops}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/venv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fifa_wc_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  prometheus:
    image: prom/prometheus:latest
    container_name: fifa_wc_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: fifa_wc_grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  grafanadata:
